name: Build Client Daemon

on:
  push:
    branches:
      - main
    paths:
      - 'client_daemon.py'
      - 'bidi_streaming_agent/tools/**'
      - '.github/workflows/build-daemon.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install websockets pyinstaller
          
      - name: Build with PyInstaller
        run: pyinstaller --onefile --name NoraDaemon client_daemon.py
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoraDaemon-${{ runner.os }}
          path: dist/NoraDaemon*
          retention-days: 7
