name: Build Client Daemon

on:
  push:
    branches:
      - main
    paths:
      - 'client_daemon.py'
      - 'bidi_streaming_agent/tools/**'
      - '.github/workflows/build-daemon.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: NoraDaemon-Linux
            python_arch: x64
          - os: macos-latest
            artifact_name: NoraDaemon-macOS-Intel
            python_arch: x64
          - os: macos-latest
            artifact_name: NoraDaemon-macOS-AppleSilicon
            python_arch: arm64
          - os: windows-latest
            artifact_name: NoraDaemon-Windows
            python_arch: x64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.python_arch }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install websockets pyinstaller
          
      - name: Build with PyInstaller
        run: pyinstaller --onefile --name NoraDaemon client_daemon.py
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/NoraDaemon*
          retention-days: 7
